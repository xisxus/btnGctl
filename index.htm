<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>GCTL Button System</title>
    <link rel="stylesheet" href="style.css">
    <style>
       /* =========================================================
        FULL SCREEN DARK MODE
        ========================================================= */
        html,
        body {
            height: 100%;
        }

        [data-bs-theme="dark"] body {
            background-color: #020617;   /* near-black */
            color: #e5e7eb;
        }

        /* Optional: prevent white flash */
        [data-bs-theme="dark"] {
            background-color: #020617;
        }

        button{
            margin: 0px;
        }

    </style>
</head>

<body style="font-family: Arial; padding: 30px">

    <button id="themeToggle" class="btn-gctl btn-gctl-primary btn-sm">
    🌙 Dark Mode
</button>


    <h2>GCTL Button System</h2>

    <h3>Default</h3>
    <button class="btn-gctl btn-gctl-success">Success</button>
    <button class="btn-gctl btn-gctl-info">Info</button>
    <button class="btn-gctl btn-gctl-danger">Danger</button>
    <button class="btn-gctl btn-gctl-warning">Warning</button>
    <button class="btn-gctl btn-gctl-primary">Primary</button>
    <button class="btn-gctl btn-gctl-secondary">Secondary</button>
    <button class="btn-gctl btn-gctl-cancel">Cancel</button>
    <button class="btn-gctl btn-gctl-close">Close</button>

    <h3>Solid</h3>
    <button class="btn-gctl btn-gctl-success btn-solid">Success</button>
    <button class="btn-gctl btn-gctl-info btn-solid">Info</button>
    <button class="btn-gctl btn-gctl-danger btn-solid">Danger</button>
    <button class="btn-gctl btn-gctl-cancel btn-solid">Cancel</button>
    <button class="btn-gctl btn-gctl-close btn-solid">Close</button>

    <h3>Soft</h3>
    <button class="btn-gctl btn-gctl-success btn-soft">Success</button>
    <button class="btn-gctl btn-gctl-warning btn-soft">Warning</button>
    <button class="btn-gctl btn-gctl-cancel btn-soft">Cancel</button>
    <button class="btn-gctl btn-gctl-close btn-soft">Close</button>

    <h3>Outline</h3>
    <button class="btn-gctl btn-gctl-primary btn-outline">Primary</button>
    <button class="btn-gctl btn-gctl-danger btn-outline">Danger</button>
    <button class="btn-gctl btn-gctl-cancel btn-outline">Cancel</button>
    <button class="btn-gctl btn-gctl-close btn-outline">Close</button>

    <h3>Sizes</h3>
    <button class="btn-gctl btn-gctl-info btn-sm">Small</button>
    <button class="btn-gctl btn-gctl-info">Normal</button>
    <button class="btn-gctl btn-gctl-info btn-lg">Large</button>

    <h3>Shapes</h3>
    <button class="btn-gctl btn-gctl-success btn-pill">Pill</button>
    <button class="btn-gctl btn-gctl-success btn-square">Square</button>

    <h3>States</h3>
    <button class="btn-gctl btn-gctl-success active">Active</button>
    <button class="btn-gctl btn-gctl-success" disabled>Disabled</button>

    <!-- Default -->


<!-- Solid -->


<!-- Soft -->


<!-- Outline -->

<div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>

<script src="script.js"></script>

</body>

</html>
